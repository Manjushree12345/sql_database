name: Gradle CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Checkout gh-pages branch for Allure history
      - name: Checkout gh-pages
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Make Gradle wrapper executable
      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      # Run tests
      - name: Run Tests
        run: ./gradlew clean test

      # Generate Allure Report with history
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: build/allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      # Verify generated report
      - name: Verify Allure Report
        if: always()
        run: |
          echo "===== build/allure-report ====="
          ls -la build/allure-report

          echo "===== allure-history ====="
          ls -la allure-history

          test -f build/allure-report/index.html

      # Upload report artifact
      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-history

      # Deploy to GitHub Pages
      - name: Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # Print report URL
      - name: Report Link
        if: always()
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          REPORT_URL="https://${OWNER}.github.io/${REPO}/"

          echo "✅ Allure Report Generated"
          echo "📊 ${REPORT_URL}"

          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 ${REPORT_URL}" >> $GITHUB_STEP_SUMMARY