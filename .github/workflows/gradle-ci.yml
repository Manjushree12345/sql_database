name: Gradle CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Tests
        run: ./gradlew.bat clean test

      - name: Restore Allure History
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/allure-results/history | Out-Null

          if (Test-Path "allure-report/history") {
              Copy-Item "allure-report/history/*" "build/allure-results/history" -Recurse -Force
          }
          else {
              Write-Host "No previous Allure history found. First run."
          }

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: build/allure-report
          keep_reports: 20

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/allure-report