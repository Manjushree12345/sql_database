name: Gradle CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents : write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew clean test

      # Restore previous history (first run will skip)
      - name: Restore Allure History
        run: |
          mkdir -p build/allure-results/history
          if [ -d "allure-report/history" ]; then
            cp -r allure-report/history/* build/allure-results/history/
          else
            echo "No previous history found."
          fi

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: build/allure-report
          keep_reports: 20

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: allure-report

      - name: Report link
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          REPORT_URL="https://${OWNER}.github.io/${REPO_NAME}/"
          echo "✅ Allure report generated"
          echo "📊 Report: ${REPORT_URL}"
          echo "📊 Report: [Open Allure report](${REPORT_URL})" >> "$GITHUB_STEP_SUMMARY"
