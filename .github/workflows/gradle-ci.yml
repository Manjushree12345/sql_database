name: Gradle CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Checkout gh-pages branch for Allure history
      - name: Checkout gh-pages
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew clean test

      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: build/allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      # Debug history (remove later if you want)
      - name: Debug Allure History
        if: always()
        run: |
          echo "===== build/allure-results ====="
          ls -R build/allure-results || true

          echo "===== allure-history ====="
          ls -R allure-history || true

          echo "===== build/allure-report/history ====="
          ls -R build/allure-report/history || true

      - name: Verify Report
        if: always()
        run: |
          test -f build/allure-report/index.html
          echo "Report generated successfully."

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/allure-report

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build/allure-report

      - name: Report Link
        if: always()
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "https://${OWNER}.github.io/${REPO}/"