name: Gradle CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout gh-pages for History
        if: always()
        continue-on-error: true
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          mkdir -p allure-history
          git show origin/gh-pages:allure-results/ > /dev/null 2>&1 && git show origin/gh-pages:allure-results/ --recurse-submodules > allure-history.tar 2>/dev/null && tar -xf allure-history.tar -C allure-history/ 2>/dev/null || true
          # Alternative: download allure-results zip if it exists
          git show origin/gh-pages:allure-results.zip > allure-history/results.zip 2>/dev/null || true
          if [ -f allure-history/results.zip ]; then
            cd allure-history && unzip -q results.zip 2>/dev/null || true && cd ..
          fi

      - name: Restore Previous Results
        if: always()
        run: |
          mkdir -p build/allure-results
          if [ -d allure-history/allure-results ]; then
            cp -r allure-history/allure-results/* build/allure-results/ 2>/dev/null || true
          fi
          echo "Previous results restored: $(ls build/allure-results/ 2>/dev/null | wc -l) files"
          echo "Content in allure-results:"
          ls -la build/allure-results/ 2>/dev/null | head -20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: build/allure-report
          keep_reports: 20

      - name: Archive Results for History
        if: always()
        run: |
          cd build
          zip -r allure-results.zip allure-results/

      - name: Verify Allure Report
        if: always()
        run: |
          echo "Generated files:"
          ls -la build/allure-report
          test -f build/allure-report/index.html

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/allure-report

      - name: Preserve Allure Results for History
        if: always()
        run: |
          mkdir -p build/allure-report/history
          cp -r build/allure-results/* build/allure-report/history/ 2>/dev/null || true
          echo "Results preserved for trend analysis"

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build/allure-report
          keep_files: true
          cname: ""

      - name: Report Link
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          REPORT_URL="https://${OWNER}.github.io/${REPO_NAME}/"
          echo "✅ Allure report generated"
          echo "📊 Report URL: ${REPORT_URL}"
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 ${REPORT_URL}" >> $GITHUB_STEP_SUMMARY